# ═══════════════════════════════════════════════════════════════
# Dutch Learning App — Docker Compose (Production)
# Usage: docker compose up -d
# ═══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dutch-app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dutch_app
      POSTGRES_USER: dutch_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dutch_admin -d dutch_app"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dutch-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Rust/Axum Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dutch-app-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://dutch_admin:${DB_PASSWORD:-changeme_in_production}@postgres:5432/dutch_app
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-in-production}
      JWT_EXPIRY_HOURS: 24
      HOST: 0.0.0.0
      PORT: 3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      BCRYPT_COST: 12
      MAX_LOGIN_ATTEMPTS: 5
      LOCKOUT_DURATION_MINS: 15
      DB_MAX_CONNECTIONS: 20
      DB_MIN_CONNECTIONS: 5
      ENABLE_REGISTRATION: "true"
      RUST_LOG: dutch_app_backend=info,tower_http=info
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dutch-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── React/Nginx Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dutch-app-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - dutch-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

volumes:
  postgres_data:
    driver: local

networks:
  dutch-net:
    driver: bridge
