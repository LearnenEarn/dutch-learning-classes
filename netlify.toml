# ═══════════════════════════════════════════════════════════════
# Dutch Learning App — Netlify Configuration
# Deploys the React/Vite frontend in demo mode (no backend needed).
# Backend (Rust/Axum) requires a separate server — see docs/DEPLOY_DIGITALOCEAN.md
# ═══════════════════════════════════════════════════════════════

[build]
  # Netlify runs build from the repo root; we point it at the frontend directory
  base    = "dutch-app/frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION    = "20"
  VITE_DEMO_MODE  = "true"

# ── SPA routing: all paths fall back to index.html ──────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers (supplements Netlify's defaults) ───────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy    = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'"

# ── Cache static assets aggressively ────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
